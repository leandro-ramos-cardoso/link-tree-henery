<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Dra. Henery Lopes - Fonoaudióloga</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'DM Sans', sans-serif;
  background: #ECEEF8;
  display: flex;
  justify-content: center;
  min-height: 100vh;
}

.phone {
  width: 100%;
  max-width: 390px;
  min-height: 100dvh;
  background: #ECEEF8;
  display: flex;
  flex-direction: column;
  position: relative;
}

/* ── FLOATING SHARE ── */
.share-floating {
  position: absolute;
  top: 15px;
  right: 15px;
  z-index: 10;
  background: rgba(255,255,255,0.8);
  border-radius: 50%;
  padding: 8px;
  border: none;
  color: #4A6CF7;
  cursor: pointer;
}

/* ── HERO ── */
.hero {
  padding: 40px 20px 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
}

.avatar-wrap {
  width: 120px; height: 120px;
  border-radius: 50%;
  background: #fff;
  padding: 4px;
  box-shadow: 0 8px 24px rgba(74,108,247,0.15);
  margin-bottom: 15px;
}
.avatar-wrap img {
  width: 100%; height: 100%;
  border-radius: 50%;
  object-fit: cover;
}

.hero-name {
  font-size: 24px;
  font-weight: 800;
  color: #1C1F3A;
  margin-bottom: 4px;
}

.hero-authority {
  font-size: 13px;
  color: #7B80A0;
  font-weight: 500;
  margin-bottom: 8px;
}

.hero-social-proof {
  font-size: 13px;
  color: #4A6CF7;
  font-weight: 700;
  margin-bottom: 15px;
}

.hero-partnership {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 20px;
}
.partner-tag {
  font-size: 10px;
  font-weight: 800;
  text-transform: uppercase;
  background: #fff;
  padding: 4px 10px;
  border-radius: 6px;
  color: #1C1F3A;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

/* ── LINKS ── */
.links {
  padding: 0 16px;
  display: flex;
  flex-direction: column;
}

.link-item {
  background: #FFFFFF;
  border-radius: 18px;
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 16px;
  text-decoration: none;
  color: #1C1F3A;
  margin-bottom: 12px;
  box-shadow: 0 2px 10px rgba(28,31,58,0.06);
  transition: all 0.2s ease;
}

/* WhatsApp Hero Style */
.link-whatsapp {
  background: #25D366;
  color: #fff;
  transform: scale(1.03);
  box-shadow: 0 6px 20px rgba(37, 211, 102, 0.3);
  animation: pulse 2s infinite;
}
.link-whatsapp .link-label { color: #fff; }
.link-whatsapp .ic { background: rgba(255,255,255,0.2); }

@keyframes pulse {
  0% { transform: scale(1.03); }
  50% { transform: scale(1.05); }
  100% { transform: scale(1.03); }
}

.ic {
  width: 44px; height: 44px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.ic svg { width: 22px; height: 22px; }

.ic-blue { background: #DDE3FB; }
.ic-pink { background: #F9D0E4; }
.ic-grey { background: #EAEBEF; }

.link-label {
  flex: 1;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: -0.2px;
}

.chevron { color: #B0B5CC; }

/* ── MODAIS (REPRIMIDOS PARA O EXEMPLO) ── */
.modal-overlay { /* Estilos de modal mantidos conforme original */ }

</style>
</head>
<body>
<div class="phone">
  <button class="share-floating">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
  </button>

  <div class="hero">
    <div class="avatar-wrap">
      <img src="data:image/jpeg;base64,..." alt="Henery Lopes">
    </div>
    <h1 class="hero-name">Henery Lopes</h1>
    <p class="hero-authority">Fonoaudióloga • CRFa 2-12345 • +10 anos de experiência</p>
    <p class="hero-social-proof">⭐ +500 pacientes atendidos • Presencial e Online</p>
    
    <div class="hero-partnership">
      <span class="partner-tag">Parceira NeuroCaminhar</span>
    </div>
  </div>

  <div class="links">
    <a href="https://wa.me/seunumeroaqui" class="link-item link-whatsapp">
      <div class="ic">
        <svg fill="#fff" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
      </div>
      <span class="link-label">Agendar consulta pelo WhatsApp</span>
      <div class="chevron"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"></polyline></svg></div>
    </a>

    <div class="link-item" onclick="openModal('treatments')">
      <div class="ic ic-blue">
        <svg fill="#4A6CF7" viewBox="0 0 24 24"><path d="M21 16.5c0 .38-.21.71-.53.88l-7.9 4.44a.994.994 0 01-.94 0l-7.9-4.44A.991.991 0 013 16.5v-9c0-.38.21-.71.53-.88l7.9-4.44c.14-.08.3-.12.47-.12.17 0 .33.04.47.12l7.9 4.44c.32.17.53.5.53.88v9z"/></svg>
      </div>
      <span class="link-label">O que eu trato</span>
      <div class="chevron"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"></polyline></svg></div>
    </div>

    <div class="link-item" onclick="openModal('about')">
      <div class="ic ic-pink">
        <svg fill="#E84D8A" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
      </div>
      <span class="link-label">Minha história e formação</span>
      <div class="chevron"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"></polyline></svg></div>
    </div>

    <div class="link-item" onclick="openModal('address')">
      <div class="ic ic-grey">
        <svg fill="#7B80A0" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-12-7zm0 9.5a2.5 2.5 0 010-5 2.5 2.5 0 010 5z"/></svg>
      </div>
      <span class="link-label">Onde me encontrar</span>
      <div class="chevron"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"></polyline></svg></div>
    </div>
  </div>

  <div style="margin-top:auto; padding: 20px; text-align:center; opacity: 0.5;">
    <img src="https://link-da-logo-fonoup.png" height="20" alt="FonoUp">
  </div>
</div>
</body>
</html>
